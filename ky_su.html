    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Lấy tất cả các nút tab và các thẻ bài viết
            const filterBtns = document.querySelectorAll('.tab-btn');
            const articles = document.querySelectorAll('.horizontal-card');

            // Lặp qua từng nút để gắn sự kiện click
            filterBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    
                    // 1. Xóa trạng thái 'active' (màu đỏ) ở tất cả các nút
                    filterBtns.forEach(b => b.classList.remove('active'));
                    
                    // 2. Thêm trạng thái 'active' cho nút vừa được click
                    this.classList.add('active');

                    // 3. Lấy giá trị của bộ lọc (vd: 'tu-tuong', 'dao-duc', 'all')
                    const filterValue = this.getAttribute('data-filter');

                    // 4. Lặp qua từng bài viết để kiểm tra
                    articles.forEach(article => {
                        const articleCategory = article.getAttribute('data-category');

                        // Nếu chọn 'Tất cả' HOẶC chủ đề bài viết khớp với nút bấm -> Hiện bài viết
                        if (filterValue === 'all' || filterValue === articleCategory) {
                            article.classList.remove('hide-article');
                        } 
                        // Ngược lại thì ẩn bài viết đi
                        else {
                            article.classList.add('hide-article');
                        }
                    });
                });
            });
        });
    </script>
